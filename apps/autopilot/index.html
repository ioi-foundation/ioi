<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOI Autopilot</title>
    <script>
      (() => {
        const isTransparentSurface = window.location.pathname.startsWith("/gate");
        document.documentElement.dataset.windowSurface = isTransparentSurface
          ? "transparent"
          : "studio";
      })();
    </script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0c0a;
      }

      html[data-window-surface="transparent"],
      html[data-window-surface="transparent"] body,
      html[data-window-surface="transparent"] #root {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
