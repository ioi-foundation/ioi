# apps/autopilot/src-tauri/Cargo.toml

[package]
name = "autopilot"
version = "0.1.0"
description = "A Tauri App"
license-file = "../../../LICENSE-BBSL"
authors = ["you"]
edition = "2021"
default-run = "autopilot"

[lib]
name = "autopilot_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "test", "unstable"] }
tauri-plugin-opener = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2" 
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
ts-rs = { version = "12.0.0", features = ["serde-json-impl"] }
ron = "0.8"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "=1.42.0", features = ["full"] }
axum = "0.7"

anyhow = { workspace = true }
async-trait = { workspace = true }

reqwest = { version = "0.11", features = ["blocking", "json"] }
regex = { workspace = true }
sha2 = "0.10"
url = "2.5"
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.19"
scraper = "0.19"
flate2 = "1.0"
tar = { workspace = true }
portpicker = { workspace = true }

# IOI Kernel Integration
ioi-ipc = { path = "../../../crates/ipc" }
ioi-types = { path = "../../../crates/types" }
ioi-crypto = { path = "../../../crates/crypto" }
ioi-api = { path = "../../../crates/api" }
ioi-services = { path = "../../../crates/services" }
ioi-drivers = { path = "../../../crates/drivers" }
ioi-memory = { path = "../../../crates/memory" }
ioi-pii = { path = "../../../crates/pii" }

# Validator + key types for local identity loading.
ioi-validator = { path = "../../../crates/validator" }
libp2p = { workspace = true }

# ByteSerializable support used by orchestration and storage paths.
dcrypt = { workspace = true }

parity-scale-codec = { workspace = true, features = ["derive", "std"] }
tonic = { version = "0.11", features = ["transport"] }

base64 = "0.21"
hex = "0.4"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
portable-pty = "0.9"

# Linux-specific: X11 for multi-threading support (XInitThreads)
[target.'cfg(target_os = "linux")'.dependencies]
x11 = { version = "2.21", features = ["xlib"] }
gtk = { version = "0.18" }
gdkx11 = { version = "0.18" }
