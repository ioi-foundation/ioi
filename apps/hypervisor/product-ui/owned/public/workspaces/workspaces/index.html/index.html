            #loading {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                top: 0;
                overflow: hidden;
                pointer-events: none;
                height: 100%;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                /* This ensures that the Desktop application is still draggable while we show the loading screen.
                   In electron we use a custom toolbar and we control the draggable area through a React components
                   but as that isn't rendered yet this ensures the window is still draggable until then.
                */
                /* TODO(mads): This break the desktop app as it steals all clicks The fix is add display:none; to the
                   loading element but I'll do that in a follow-up PR and then add the dragging back
 *              */
                /* -webkit-app-region: drag; */
            }
            body.loaded #loading {
                transition: opacity 0.4s ease-out;
                animation: fadeOut 0.4s ease-out;
                opacity: 0;
            }
            #loading-content {
                width: 45px;
                height: 46px;
                transition: opacity 0.4s ease-out;
                /* We delay the animation by 1s to ensure we only show the loading screen
                   if it takes more than 1s to load the assets and render the React application */
                animation: fadeIn 0.4s ease-out 1s both;
            }
            /* Match IOI theme surfaces before Tailwind loads.

            .dark body,

            .dark #loading-logo {
