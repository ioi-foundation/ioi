<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOI Hypervisor</title>
    <script>
      (() => {
        const isTransparentSurface = window.location.pathname.startsWith("/gate");
        document.documentElement.dataset.windowSurface = isTransparentSurface
          ? "transparent"
          : "chat";
      })();
    </script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      .hypervisor-boot-fallback {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        color: #1f1f1f;
        font: 13px/1.45 "ABC Diatype", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .hypervisor-boot-fallback__rail {
        box-sizing: border-box;
        min-height: 100%;
        background: #f7f7f6;
        border-right: 1px solid #dddddb;
      }

      .hypervisor-boot-fallback__brand {
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid #ececea;
      }

      .hypervisor-boot-fallback__brand-cluster {
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }

      .hypervisor-boot-fallback__brand-pipe {
        content: "";
        width: 1px;
        height: 18px;
        background: #18181b;
      }

      .hypervisor-boot-fallback__mark {
        width: 18px;
        height: 18px;
        border: 1px solid #93c5fd;
        transform: rotate(45deg);
        background:
          linear-gradient(135deg, #315cff 0 48%, transparent 49%),
          linear-gradient(315deg, #9db7ff 0 48%, transparent 49%);
      }

      .hypervisor-boot-fallback__collapse {
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
        color: #27272a;
      }

      .hypervisor-boot-fallback__collapse::before {
        content: "≡";
        font-size: 17px;
        line-height: 1;
        transform: rotate(180deg);
      }

      .hypervisor-boot-fallback__row,
      .hypervisor-boot-fallback__skeleton-row {
        box-sizing: border-box;
        width: calc(100% - 16px);
        height: 32px;
        margin: 0 8px;
        border-radius: 8px;
      }

      .hypervisor-boot-fallback__row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
        padding: 0 10px;
        border: 1px solid #e1e1e1;
        background: #f7f7f6;
        font-weight: 600;
      }

      .hypervisor-boot-fallback__row span:first-child {
        font-size: 19px;
        font-weight: 300;
        line-height: 1;
      }

      .hypervisor-boot-fallback__skeleton {
        display: grid;
        gap: 8px;
        padding-top: 12px;
      }

      .hypervisor-boot-fallback__skeleton-row {
        background: #ececeb;
      }

      .hypervisor-boot-fallback__skeleton-row:nth-child(2) {
        width: 55%;
      }

      .hypervisor-boot-fallback__main {
        min-width: 0;
        min-height: 100%;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      .hypervisor-boot-fallback__status {
        width: min(728px, calc(100vw - 360px));
        color: #6f6f76;
        text-align: center;
      }

      .hypervisor-boot-fallback__status strong {
        display: block;
        margin-bottom: 8px;
        color: #18181b;
        font-size: 20px;
        font-weight: 600;
      }

      .hypervisor-boot-fallback__detail {
        margin: 0;
      }

      .hypervisor-boot-fallback__error {
        margin-top: 12px;
        white-space: pre-wrap;
        color: #b42318;
      }

      html[data-window-surface="transparent"],
      html[data-window-surface="transparent"] body,
      html[data-window-surface="transparent"] #root {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <script>
      (() => {
        const showBootError = (message, detail = "") => {
          const root = document.getElementById("root");
          if (!root) return;
          const error = root.querySelector("[data-hypervisor-boot-error]");
          if (error) {
            error.textContent = [message, detail].filter(Boolean).join("\n");
          }
        };
        window.addEventListener("error", (event) => {
          const target = event.target;
          const asset = target && target !== window && "src" in target ? target.src : "";
          showBootError(
            event.message || "Hypervisor failed before React could mount.",
            asset || event.filename || "",
          );
        });
        window.addEventListener("unhandledrejection", (event) => {
          const reason = event.reason;
          showBootError(
            "Hypervisor failed before React could mount.",
            reason && reason.stack ? reason.stack : String(reason ?? ""),
          );
        });
      })();
    </script>
    <div id="root">
      <div class="hypervisor-boot-fallback" role="status" aria-live="polite">
        <aside class="hypervisor-boot-fallback__rail" aria-hidden="true">
          <div class="hypervisor-boot-fallback__brand">
            <span class="hypervisor-boot-fallback__brand-cluster">
              <span class="hypervisor-boot-fallback__brand-pipe"></span>
              <span class="hypervisor-boot-fallback__mark"></span>
              <span class="hypervisor-boot-fallback__brand-pipe"></span>
            </span>
            <span class="hypervisor-boot-fallback__collapse"></span>
          </div>
          <div class="hypervisor-boot-fallback__row">
            <span>+</span>
            <span>New Session</span>
          </div>
          <div class="hypervisor-boot-fallback__skeleton">
            <span class="hypervisor-boot-fallback__skeleton-row"></span>
            <span class="hypervisor-boot-fallback__skeleton-row"></span>
            <span class="hypervisor-boot-fallback__skeleton-row"></span>
          </div>
        </aside>
        <main class="hypervisor-boot-fallback__main">
          <section class="hypervisor-boot-fallback__status">
            <strong>Starting Hypervisor</strong>
            <p class="hypervisor-boot-fallback__detail">
              Opening the workspace.
            </p>
            <pre class="hypervisor-boot-fallback__error" data-hypervisor-boot-error></pre>
          </section>
        </main>
      </div>
    </div>
    <script type="module">
      import("/src/main.tsx").catch((error) => {
        const root = document.getElementById("root");
        const target = root?.querySelector("[data-hypervisor-boot-error]");
        if (target) {
          target.textContent = [
            "Hypervisor failed to open the workspace shell.",
            error && error.stack ? error.stack : String(error ?? ""),
          ]
            .filter(Boolean)
            .join("\n");
        }
      });
    </script>
  </body>
</html>
