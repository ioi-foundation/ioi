<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">Internet of Intelligence Hero</title>
  <desc id="desc">Dark cinematic IOI hero reading Alignment security for machine authority and a programmable economy for hiring verifiable workers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02050b"/>
      <stop offset="0.48" stop-color="#071321"/>
      <stop offset="1" stop-color="#010308"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#5aa8ff"/>
      <stop offset="0.55" stop-color="#b7c7ff"/>
      <stop offset="1" stop-color="#6aa6ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2f89ff" stop-opacity="0.30"/>
      <stop offset="0.62" stop-color="#115aa0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .eyebrow {
      fill: #7aaee8;
      font-family: Arial;
      font-size: 14px;
      font-weight: 750;
      letter-spacing: 0.22em;
    }
    .headline {
      fill: #eef4ff;
      font-family: Arial;
      font-size: 70px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .accent { fill: #b8c8ff; }
    .subhead {
      fill: #b6c0cf;
      font-family: Arial;
      font-size: 22px;
      font-weight: 450;
    }
    .micro {
      fill: #7d91aa;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
    }
    .rule { stroke: #27496d; stroke-width: 1; }
    .grid { stroke: #1d5f9c; stroke-width: 0.8; opacity: 0.25; }
    .wire { fill: none; stroke: #58aaff; stroke-width: 1.25; opacity: 0.82; }
    .wire-soft { fill: none; stroke: #79b7ff; stroke-width: 1; opacity: 0.32; }
  </style>

  <rect width="1440" height="560" fill="url(#bg)"/>
