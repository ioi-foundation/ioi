<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">Canonical Web4 Equation</title>
  <desc id="desc">Web4 equals Read plus Write plus Own plus Act with cryptographic determinism.</desc>
  <metadata>LaTeX source: \mathrm{Web4} = \mathrm{Read} + \mathrm{Write} + \mathrm{Own} + \mathrm{Act}_{\mathrm{cryptographic\ determinism}}</metadata>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#03070f"/>
      <stop offset="0.54" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020409"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#7db7ff"/>
      <stop offset="1" stop-color="#c9d7ff"/>
    </linearGradient>
  </defs>
  <style>
    .label {
      fill: #7aaee8;
      font-family: Arial;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.19em;
    }
    .eq {
      fill: #eef4ff;
      font-family: Georgia;
      font-size: 46px;
      font-style: italic;
    }
    .op {
      fill: #9eb9e8;
      font-family: Arial;
      font-size: 38px;
      font-weight: 500;
    }
    .sub {
      fill: #83b8ff;
      font-family: Georgia;
      font-size: 17px;
      font-style: italic;
    }
    .caption {
      fill: #aeb9c8;
      font-family: Arial;
      font-size: 15px;
    }
    .rule { stroke: #254468; stroke-width: 1; }
    .hairline { stroke: #17304d; stroke-width: 1; }
    .trace { stroke: #1e6bb0; stroke-width: 1; opacity: 0.34; }
  </style>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <circle cx="1010" cy="82" r="124" fill="none" stroke="#2a70b6" stroke-width="1.1" opacity="0.48"/>
  <circle cx="1010" cy="82" r="82" fill="none" stroke="#1e5f9e" stroke-width="0.9" opacity="0.38"/>
  <line class="rule" x1="48" y1="38" x2="1152" y2="38"/>
  <line class="hairline" x1="48" y1="164" x2="1152" y2="164"/>
  <path class="trace" d="M48 188 C230 130 316 210 490 152 S832 150 1152 86"/>
  <path class="trace" d="M48 118 C236 74 352 74 522 118 S820 174 1152 134"/>

  <text class="label" x="48" y="72">WEB4 PRIMITIVE</text>
  <text class="eq" x="214" y="112">Web4</text>
  <text class="op" x="342" y="112">=</text>
  <text class="eq" x="398" y="112">Read</text>
  <text class="op" x="523" y="112">+</text>
  <text class="eq" x="572" y="112">Write</text>
  <text class="op" x="710" y="112">+</text>
  <text class="eq" x="760" y="112">Own</text>
  <text class="op" x="875" y="112">+</text>
  <text class="eq" x="924" y="112">Act</text>
  <text class="sub" x="785" y="138">cryptographic determinism</text>

  <text class="caption" x="48" y="196">Autonomous action is admissible only after authority, policy, receipt, replay, and settlement constraints collapse it into deterministic state.</text>
</svg>
