SPECIFICATION RecurringLivenessSpec

INVARIANTS
  TypeInvariant
  Safety
  FinalizationWitnessSoundness
  ContinuationSoundness
  CycleAdvanceRequiresPreviousFetch
  CycleTransferLandingSoundness

PROPERTY
  EventuallyFinalCycleFetches
  RecurringCycleFetches
  RecurringCycleTransfers

CONSTANTS
  Validators = {v1, v2}
  Witnesses = {w1, w2}
  Blocks = {b1, b2, b3, b4}
  Slots = {s1, s2, s3, s4}
  Epochs = {1, 2, 3, 4, 5}
  QuorumSize = 2
  MaxReassignmentDepth = 1
  InitialEpoch = 1
  InitialWitness = w1
  TargetSlot1 = s1
  TargetSlot2 = s2
  TargetSlot3 = s3
  TargetSlot4 = s4
  TargetBlock1 = b1
  TargetBlock2 = b2
  TargetBlock3 = b3
  TargetBlock4 = b4
  StableEpoch1 = 2
  StableEpoch2 = 3
  StableEpoch3 = 4
  StableEpoch4 = 5
