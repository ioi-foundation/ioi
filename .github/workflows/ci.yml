name: IOI Kernel CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pii_hard_gates:
    name: PII Hard Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pii-hard-gates-${{ hashFiles('**/Cargo.lock') }}

      - name: Hard Gate - Deterministic PII Routing/Transform
        run: cargo test --locked -p ioi-pii

      - name: Hard Gate - Firewall Invariants
        run: cargo test --locked -p ioi-services --test pii_hard_gates

      - name: Hard Gate - Zero Leak Metrics
        run: cargo test --locked -p ioi-services --test pii_metrics

      - name: Hard Gate - Review Determinism E2E
        run: cargo test --locked -p ioi-cli --test pii_review_determinism_e2e --features "consensus-admft vm-wasm state-iavl" -- --nocapture

  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: pii_hard_gates
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Contract Invariant Reference Check
        run: bash .github/scripts/check_contract_invariants.sh
          
      - name: Check format
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
          
      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets --all-features -- -D warnings
          
      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --locked --all-features
          
      - name: Run tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --locked --all-features

  reliability_browser_e2e:
    name: Reliability Browser E2E
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ioi-data/browser_cache
          key: ${{ runner.os }}-cargo-reliability-browser-${{ hashFiles('**/Cargo.lock') }}

      - name: Install browser lane dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Run browser reliability suite test (ignored lane)
        env:
          IOI_RELIABILITY_REQUIRE_DISPLAY: "1"
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_browser"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          xvfb-run -a cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::browser_snapshot_click::browser_snapshot_then_click_element_updates_fixture -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/test.log"

      - name: Upload browser reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-browser-e2e-artifacts
          path: .artifacts/reliability_browser
          if-no-files-found: warn

  reliability_gui_e2e:
    name: Reliability GUI E2E
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-reliability-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GUI runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk dbus-x11 at-spi2-core libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Verify DBus pkg-config metadata (GUI lane)
        run: pkg-config --modversion dbus-1

      - name: Run GUI reliability suite test (ignored lane)
        env:
          IOI_RELIABILITY_REQUIRE_GUI: "1"
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_gui"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          dbus-run-session -- xvfb-run -a cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::gui_snapshot_click::gui_snapshot_then_click_element_emits_click_input -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/test.log"

      - name: Upload GUI reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-gui-e2e-artifacts
          path: .artifacts/reliability_gui
          if-no-files-found: warn

  reliability_shell_web_e2e:
    name: Reliability Shell/Web E2E
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-reliability-shell-web-${{ hashFiles('**/Cargo.lock') }}

      - name: Install shell/web lane dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Verify DBus pkg-config metadata (shell/web lane)
        run: pkg-config --modversion dbus-1

      - name: Run shell + web reliability suite tests (ignored lane)
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_shell_web"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::sys_exec_session::sys_exec_session_continuity_reset_failure_receipts_and_anti_loop -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/sys_exec_session.log"
          cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::web_retrieval::web_retrieval_and_net_fetch_emit_deterministic_receipts_and_anti_loop -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/web_retrieval.log"

      - name: Upload shell/web reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-shell-web-e2e-artifacts
          path: .artifacts/reliability_shell_web
          if-no-files-found: warn

  phase0_reliability_gate:
    name: Phase0 Reliability Gate
    runs-on: ubuntu-latest
    needs:
      - reliability_browser_e2e
      - reliability_gui_e2e
      - reliability_shell_web_e2e
    steps:
      - name: Phase-0 hardening reliability lanes passed
        run: |
          echo "Phase-0 reliability lanes passed: browser/gui/shell-web."

  build_examples:
    name: Build Examples
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-examples-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build examples
        run: |
          for example in examples/*; do
            if [ -d "$example" ]; then
              echo "Building example: $example"
              cargo build --locked --release --manifest-path $example/Cargo.toml
            fi
          done
