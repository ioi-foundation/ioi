name: IOI Kernel CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install native deps for kernel build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            libdbus-1-dev \
            protobuf-compiler \
            libxcb1-dev \
            libxdo-dev

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true
          components: rustfmt

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Canon pre-next-leg bar
        run: npm run check:pre-next-leg

      - name: Check format
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --locked --all-features -p ioi-types -p ioi-api -p ioi-pii -p ioi-telemetry

      - name: Run tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --locked --all-features -p ioi-types -p ioi-api -p ioi-pii -p ioi-telemetry

      - name: Convergent Fault Tolerance Gates
        run: |
          cargo test --locked -p ioi-consensus --features aft guardian_majority_safety_holds_below_quorum_intersection_budget -- --nocapture
          cargo test --locked -p ioi-consensus --features aft experimental_nested_guardian_accepts_deterministically_assigned_witness_certificate -- --nocapture
          cargo test --locked -p ioi-services rejects_unsafe_odd_sized_guardian_committee_under_production_policy -- --nocapture
