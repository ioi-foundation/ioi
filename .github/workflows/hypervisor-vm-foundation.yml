# T3 — KVM-enabled CI lane for the Hypervisor VM foundation.
#
# Reproduces the VM toolchain (cloud-hypervisor / Firecracker, pinned + checksummed) from a fresh
# environment and runs the Phase 1 lifecycle verifier. Requires a runner with /dev/kvm (a
# KVM-enabled larger/self-hosted runner — standard GitHub-hosted runners lack nested virt). The
# cache key is the supply manifest, so monitor binaries/kernels are pulled once per pin.
name: hypervisor-vm-foundation

on:
  push:
    paths:
      - "crates/node/src/bin/hypervisor**"
      - "scripts/phase1/**"
      - "scripts/verify-phase1-env-lifecycle.mjs"
      - "scripts/verify-hypervisor-*.mjs"
      - ".github/workflows/hypervisor-vm-foundation.yml"
  schedule:
    - cron: "0 7 * * *" # nightly --n 25
  workflow_dispatch:
    inputs:
      iterations:
        description: "verifier iterations (--n)"
        default: "1"

jobs:
  vm-lifecycle:
    runs-on: [self-hosted, kvm] # a runner exposing /dev/kvm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Host capability check (fail fast if no KVM)
        run: |
          test -e /dev/kvm || { echo "::error::/dev/kvm absent — KVM-enabled runner required"; exit 1; }
          echo "kvm: present; vhost_vsock: $([ -e /dev/vhost-vsock ] && echo present || echo absent)"

      - name: Toolchain cache (keyed by supply manifest pins)
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: ~/.ioi/vm-toolchain
          key: ioi-vm-toolchain-${{ hashFiles('scripts/phase1/provision-vm-toolchain.sh', 'scripts/phase1/guest-agent.c') }}

      - name: Build daemon
        run: cargo build --bin hypervisor-daemon

      - name: Provision VM toolchain (pinned + checksummed; fails closed on mismatch)
        run: bash scripts/phase1/provision-vm-toolchain.sh

      - name: Verify VM toolchain (sha256 pins + host capabilities)
        run: node scripts/phase1/verify-vm-toolchain.mjs --json | tee vm-toolchain.json

      - name: Phase 1 lifecycle verifier
        run: node scripts/verify-phase1-env-lifecycle.mjs --n ${{ github.event_name == 'schedule' && '25' || github.event.inputs.iterations || '1' }}

      - name: Lane closure (truthful repo-state report)
        if: always()
        run: node scripts/verify-hypervisor-lane-closure.mjs --json | tee lane-closure.json

      - name: Fresh-HOME bootstrap smoke (no pre-existing local state)
        run: |
          tmp_home="$(mktemp -d)"
          HOME="$tmp_home" bash scripts/phase1/provision-vm-toolchain.sh --offline-cache "$HOME/.ioi/vm-toolchain"
          HOME="$tmp_home" node scripts/verify-phase1-env-lifecycle.mjs --n 1

      - name: Upload verifier artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypervisor-vm-foundation
          path: |
            vm-toolchain.json
            lane-closure.json
