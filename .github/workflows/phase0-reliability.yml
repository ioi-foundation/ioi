name: Phase0 Reliability CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  reliability_browser_e2e:
    name: Reliability Browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ioi-data/browser_cache
          key: ${{ runner.os }}-cargo-phase0-reliability-browser-${{ hashFiles('**/Cargo.lock') }}

      - name: Install browser lane dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Run browser reliability suite test (ignored lane)
        env:
          IOI_RELIABILITY_REQUIRE_DISPLAY: "1"
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_browser"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          xvfb-run -a cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::browser_snapshot_click::browser_snapshot_then_click_element_updates_fixture -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/test.log"

      - name: Upload browser reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-reliability-browser-e2e-artifacts
          path: .artifacts/reliability_browser
          if-no-files-found: warn

  reliability_gui_e2e:
    name: Reliability GUI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-phase0-reliability-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GUI runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk python3-gi gir1.2-gtk-3.0 libgtk-3-0 dbus-x11 at-spi2-core libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Verify DBus pkg-config metadata (GUI lane)
        run: pkg-config --modversion dbus-1

      - name: Run GUI reliability suite test (ignored lane)
        env:
          IOI_RELIABILITY_REQUIRE_GUI: "1"
          IOI_RELIABILITY_GUI_ALLOW_ROOT_FALLBACK: "1"
          NO_AT_BRIDGE: "0"
          GTK_MODULES: "gail:atk-bridge"
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_gui"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          dbus-run-session -- xvfb-run -a cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::gui_snapshot_click::gui_snapshot_then_click_element_emits_click_input -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/test.log"

      - name: Upload GUI reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-reliability-gui-e2e-artifacts
          path: .artifacts/reliability_gui
          if-no-files-found: warn

  reliability_shell_web_e2e:
    name: Reliability Shell/Web E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93.1
          override: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-phase0-reliability-shell-web-${{ hashFiles('**/Cargo.lock') }}

      - name: Install shell/web lane dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config protobuf-compiler libxcb1-dev libxdo-dev

      - name: Verify DBus pkg-config metadata (shell/web lane)
        run: pkg-config --modversion dbus-1

      - name: Run shell + web reliability suite tests (ignored lane)
        run: |
          set -o pipefail
          ARTIFACT_DIR=".artifacts/reliability_shell_web"
          mkdir -p "${ARTIFACT_DIR}"
          export IOI_RELIABILITY_ARTIFACT_DIR="${GITHUB_WORKSPACE}/${ARTIFACT_DIR}/test_artifacts"
          cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::sys_exec_session::sys_exec_session_continuity_reset_failure_receipts_and_anti_loop -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/sys_exec_session.log"
          cargo test --locked -p ioi-cli --test reliability_suite_e2e --features "consensus-admft vm-wasm state-iavl" reliability_suite::web_retrieval::web_retrieval_and_net_fetch_emit_deterministic_receipts_and_anti_loop -- --ignored --exact --nocapture 2>&1 | tee "${ARTIFACT_DIR}/web_retrieval.log"

      - name: Upload shell/web reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-reliability-shell-web-e2e-artifacts
          path: .artifacts/reliability_shell_web
          if-no-files-found: warn

  phase0_reliability_gate:
    name: Phase0 Reliability Gate
    runs-on: ubuntu-latest
    needs:
      - reliability_browser_e2e
      - reliability_gui_e2e
      - reliability_shell_web_e2e
    steps:
      - name: Phase-0 hardening reliability lanes passed
        run: |
          echo "Phase-0 reliability lanes passed: browser/gui/shell-web."
