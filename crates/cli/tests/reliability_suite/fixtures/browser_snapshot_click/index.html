<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browser Snapshot Click Fixture</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1f2933;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --outline: #cad2da;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, #dbeafe 0%, transparent 40%),
        radial-gradient(circle at 80% 0%, #fde68a 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(640px, 100%);
      background: var(--panel);
      border: 1px solid var(--outline);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.45;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease;
    }

    button:focus-visible {
      outline: 2px solid #0ea5e9;
      outline-offset: 2px;
    }

    #increment-btn {
      background: var(--accent);
      color: #fff;
    }

    #increment-btn:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    #count {
      display: inline-block;
      min-width: 130px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: #0f172a;
    }

    code {
      background: #ecfeff;
      color: #0f172a;
      border-radius: 6px;
      padding: 2px 6px;
      border: 1px solid #c7f9f5;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Browser reliability fixture">
    <h1>Snapshot to Click Reliability Fixture</h1>
    <p>
      This page is used by e2e tests to validate
      <code>browser__inspect -> browser__click</code>.
    </p>
    <div class="controls">
      <button id="increment-btn" type="button" aria-label="Increment Count">
        Increment Count
      </button>
      <output id="count" aria-live="polite">Count is now 0</output>
    </div>
  </main>

  <script>
    (function () {
      let count = 0;
      const button = document.getElementById("increment-btn");
      const output = document.getElementById("count");

      function render() {
        output.textContent = "Count is now " + count;
        if (count === 0) {
          button.textContent = "Increment Count";
        } else {
          button.textContent = "Increment Count (clicked " + count + ")";
        }
        // Ensures deterministic tree mutation for postcondition checks.
        document.body.setAttribute("data-click-seq", String(count));
      }

      button.addEventListener("click", function () {
        count += 1;
        render();
      });

      render();
    })();
  </script>
</body>
</html>
